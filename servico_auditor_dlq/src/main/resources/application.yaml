spring:
  application:
    name: servico_auditor_dlq


  datasource:
    url: jdbc:h2:mem:arq_software
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  sql:
    init:
      mode: always

  cloud:
    aws:
      region:
        static: us-east-2

      credentials:
        access-key: ${ACCESS_KEY}
        secret-key: ${SECRET_KEY}
server:
  port: 8081
queue:
  order-events: T03N_KAIKE_MIORANZA.fifo